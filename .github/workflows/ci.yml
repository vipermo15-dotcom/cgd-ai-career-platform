name: CI - 코드 품질 및 문서 검증

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate-markdown:
    name: Markdown 문서 검증
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: markdownlint 설치
        run: npm install -g markdownlint-cli
      
      - name: Markdown 문법 검사
        run: |
          markdownlint '**/*.md' \
            --ignore node_modules \
            --ignore .git \
            --config .markdownlint.json || true
          echo "Markdown 검사 완료"
  
  validate-json:
    name: JSON 파일 검증
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: JSON 문법 검사
        run: |
          find . -name "*.json" \
            -not -path "./node_modules/*" \
            -not -path "./.git/*" \
            | while read file; do
              python3 -c "import json; json.load(open('$file'))" && echo "OK: $file" || echo "ERROR: $file"
            done
  
  check-python:
    name: Python 스크립트 검증
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 문법 검사 (flake8)
        run: |
          pip install flake8
          find . -name "*.py" \
            -not -path "./node_modules/*" \
            | xargs flake8 --max-line-length=100 --ignore=E501 || true
          echo "Python 검사 완료"
  
  check-links:
    name: 링크 유효성 검사
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: markdown-link-check 설치
        run: npm install -g markdown-link-check
      
      - name: 링크 검사
        run: |
          find . -name "*.md" \
            -not -path "./node_modules/*" \
            | head -20 \
            | xargs -I {} markdown-link-check {} --quiet || true
          echo "링크 검사 완료"
  
  summary:
    name: CI 결과 요약
    runs-on: ubuntu-latest
    needs: [validate-markdown, validate-json, check-python]
    if: always()
    
    steps:
      - name: 결과 요약
        run: |
          echo "=== CI 검사 결과 ==="
          echo "Markdown 검사: ${{ needs.validate-markdown.result }}"
          echo "JSON 검사: ${{ needs.validate-json.result }}"
          echo "Python 검사: ${{ needs.check-python.result }}"
          echo "===================="
